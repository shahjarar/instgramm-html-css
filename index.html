<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instagram Login Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">
        <img src="https://static.cdninstagram.com/rsrc.php/yN/r/-erGonz07kB.webp" width="500" height="300">
        <h1>See everyday moments from</h1>
        <h2>your <span>close friends</span>.</h2>
    </div>

    <!-- Right Side -->
    <div class="right">
        <div class="login-box">
            <h2>Log in to Instagram</h2>

            <input type="text" placeholder="Mobile number, username or email">
            <input type="password" placeholder="Password">

            <button>Log in</button>

            <p class="forgot">Forgot password?</p>
        </div>
    </div>

</div>

</body>
</html>
